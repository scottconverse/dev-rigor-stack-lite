name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python tools/validate_bundle.py
      - run: python tools/test_rigor_goals.py
      - name: Installer smoke on Linux (default-on contract)
        if: runner.os == 'Linux'
        run: |
          # A bare install from a project dir must produce ALL THREE tiers.
          mkdir -p "$RUNNER_TEMP/proj" && cd "$RUNNER_TEMP/proj"
          "$GITHUB_WORKSPACE/install.sh" ".claude/skills"
          test "$(find .claude/skills -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 19
          test -f .claude/tools/rigor_goals.py
          grep -qF '<!-- dev-rigor-lite anchor' CLAUDE.md
          # second run must be idempotent: still exactly one managed block
          "$GITHUB_WORKSPACE/install.sh" ".claude/skills" --force
          test "$(grep -cF '<!-- dev-rigor-lite anchor v' CLAUDE.md)" -eq 1
          # owner opt-outs produce skills only
          mkdir -p "$RUNNER_TEMP/bare" && cd "$RUNNER_TEMP/bare"
          "$GITHUB_WORKSPACE/install.sh" ".agents/skills" --no-goals --no-anchor
          test ! -e .agents/tools && test ! -e AGENTS.md
          # anchor inference is case-insensitive (review regression)
          mkdir -p "$RUNNER_TEMP/uc" && cd "$RUNNER_TEMP/uc"
          "$GITHUB_WORKSPACE/install.sh" ".CLAUDE/skills"
          test -f CLAUDE.md && test ! -e AGENTS.md
          # opt-out + explicit override is a refused contradiction (review regression)
          mkdir -p "$RUNNER_TEMP/conflict" && cd "$RUNNER_TEMP/conflict"
          if "$GITHUB_WORKSPACE/install.sh" skills --no-goals --goals mytools; then
            echo "conflicting flags were accepted"; exit 1
          fi
          test ! -e mytools
          # 0.3.2 migration: old lite-owned audit-lite removed; full-stack copy preserved
          mkdir -p "$RUNNER_TEMP/mig/.claude/skills/audit-lite" && cd "$RUNNER_TEMP/mig"
          printf 'old lite copy. Escalate to `audit-team-lite`.\n' > .claude/skills/audit-lite/SKILL.md
          "$GITHUB_WORKSPACE/install.sh" ".claude/skills" --force --no-anchor --no-goals
          test ! -e .claude/skills/audit-lite
          mkdir -p "$RUNNER_TEMP/keep/.claude/skills/audit-lite" && cd "$RUNNER_TEMP/keep"
          printf 'FULL stack. Escalate to `audit-team`.\n' > .claude/skills/audit-lite/SKILL.md
          "$GITHUB_WORKSPACE/install.sh" ".claude/skills" --force --no-anchor --no-goals
          test -f .claude/skills/audit-lite/SKILL.md
          grep -q "FULL stack" .claude/skills/audit-lite/SKILL.md
      - name: Anchor idempotency with a CRLF checkout (gate regression)
        if: runner.os == 'Linux'
        run: |
          # Simulate core.autocrlf=true: the anchor source checks out CRLF.
          cp -r . "$RUNNER_TEMP/crlf-repo"
          sed -i 's/$/\r/' "$RUNNER_TEMP/crlf-repo/anchor/anchor.md"
          bash "$RUNNER_TEMP/crlf-repo/install.sh" "$RUNNER_TEMP/crlf-skills" --anchor "$RUNNER_TEMP/crlf-CLAUDE.md"
          out=$(bash "$RUNNER_TEMP/crlf-repo/install.sh" "$RUNNER_TEMP/crlf-skills" --force --anchor "$RUNNER_TEMP/crlf-CLAUDE.md")
          echo "$out" | grep -qF 'already current' || { echo "first refresh after CRLF install was not idempotent: $out"; exit 1; }
      - name: Installer smoke on Windows (default-on contract)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $installer = Join-Path $PWD 'install.ps1'
          $proj = Join-Path $env:RUNNER_TEMP 'proj'
          New-Item -ItemType Directory -Force -Path $proj | Out-Null
          Set-Location $proj
          & $installer -Target ".claude\skills"
          if ((Get-ChildItem "$proj\.claude\skills" -Directory).Count -ne 19) { throw 'wrong skill count' }
          if (-not (Test-Path "$proj\.claude\tools\rigor_goals.py")) { throw 'rigor-goals not installed by default' }
          if (-not (Select-String -Path "$proj\CLAUDE.md" -SimpleMatch '<!-- dev-rigor-lite anchor' -Quiet)) { throw 'anchor block missing by default' }
          & $installer -Target ".claude\skills" -Force
          $blocks = (Select-String -Path "$proj\CLAUDE.md" -SimpleMatch '<!-- dev-rigor-lite anchor v' -AllMatches | Measure-Object).Count
          if ($blocks -ne 1) { throw "expected exactly one managed block, found $blocks" }
          $bare = Join-Path $env:RUNNER_TEMP 'bare'
          New-Item -ItemType Directory -Force -Path $bare | Out-Null
          Set-Location $bare
          & $installer -Target ".agents\skills" -NoGoals -NoAnchor
          if (Test-Path "$bare\.agents\tools") { throw 'opt-out still installed goals' }
          if (Test-Path "$bare\AGENTS.md") { throw 'opt-out still installed anchor' }
      - name: Relative paths resolve against $PWD (gate regression)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # The documented usage: cd into a project, run the installer with relative paths.
          $proj = Join-Path $env:RUNNER_TEMP 'relproj'
          New-Item -ItemType Directory -Force -Path $proj | Out-Null
          $installer = Join-Path $PWD 'install.ps1'
          Set-Location $proj
          & $installer -Target '.claude\skills' -Anchor 'CLAUDE.md'
          if (-not (Test-Path "$proj\.claude\skills\dev-rigor-stack-lite")) { throw 'skills did not land in the cd-ed project' }
          if (-not (Test-Path "$proj\CLAUDE.md")) { throw 'anchor did not land in the cd-ed project' }
